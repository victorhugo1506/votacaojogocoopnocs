<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartas CS - O Esquadrão</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600&display=swap');

        body {
            background-color: #1a1a24;
            margin: 0;
            padding: 50px;
            font-family: Arial, sans-serif;
            color: white;
        }

        h1 {
            text-align: center;
            font-family: 'Teko', sans-serif;
            font-size: 50px;
            letter-spacing: 2px;
            margin-bottom: 40px;
            color: #f7d571;
        }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Design Base da Carta */
        .cs-card {
            width: 320px;
            height: 480px;
            background-color: transparent;
            background-size: 100% 100%;
            background-position: center;
            position: relative;
            overflow: hidden;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9);
            /* Sombra no texto para leitura nos fundos claros */
            transition: transform 0.2s;
        }

        .cs-card:hover {
            transform: translateY(-10px);
        }

        /* Classes Dinâmicas de Categoria */
        .ouro {
            background-image: url('ouro.jpg');
        }

        .prata {
            background-image: url('prata.jpg');
        }

        .bronze {
            background-image: url('bronze.jpg');
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            padding: 20px 20px 0 20px;
            position: relative;
            z-index: 2;
        }

        .header-left {
            text-align: center;
        }

        .overall {
            font-family: 'Teko', sans-serif;
            font-size: 55px;
            font-weight: 600;
            line-height: 0.8;
            color: #fff;
            /* Deixei branco para combinar melhor com os 3 templates */
        }

        .position {
            font-size: 16px;
            font-weight: bold;
            margin-top: 5px;
            color: #eee;
        }

        .header-right {
            text-align: right;
        }

        /* Estilo da Bandeira */
        .flag {
            width: 35px;
            border-radius: 3px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            margin-top: 5px;
        }

        .card-image {
            width: 100%;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-top: -30px;
            position: relative;
            z-index: 1;
        }

        .card-image img {
            max-height: 100%;
            max-width: 90%;
            object-fit: contain;
        }

        .card-name {
            font-family: 'Teko', sans-serif;
            font-size: 32px;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 3px;
            margin: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 5px;
            margin-left: 20px;
            margin-right: 20px;
        }

        .card-stats {
            display: flex;
            justify-content: space-around;
            padding: 10px 20px;
        }

        .stat-column {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-family: 'Teko', sans-serif;
        }

        .stat-value {
            font-weight: 600;
            font-size: 24px;
            width: 30px;
            text-align: right;
        }

        .stat-label {
            font-weight: normal;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <h1>Votação Jogo Coop - CS2</h1>

    <div class="cards-container" id="time-amigos"></div>

    <script>
        const jogadores = [
            {
                nome: "Negaolol",
                posicao: "Entry",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 88, mov: 85, noc: 92, uti: 89, imp: 86, clu: 90 }
            },
            {
                nome: "Alisson To Certo",
                posicao: "AWP",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 90, mov: 82, noc: 85, uti: 80, imp: 91, clu: 87 }
            },
            {
                nome: "Kaue Superidol",
                posicao: "Entry",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 92, mov: 88, noc: 80, uti: 75, imp: 90, clu: 78 }
            },
            {
                nome: "Mathias Flinstons",
                posicao: "SUP",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 }
            },
            {
                nome: "Osvaldo",
                posicao: "SUP",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 55, mov: 50, noc: 52, uti: 58, imp: 50, clu: 55 }
            },
            {
                nome: "Indianolol",
                posicao: "SUP",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 }
            },
            {
                nome: "Modafoquin Bilas",
                posicao: "SUP",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 }
            },
            {
                nome: "GGelo",
                posicao: "SUP",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 }
            },
            {
                nome: "Wandher Omisso",
                posicao: "SUP",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 }
            },
            {
                nome: "Psicologo Vitor",
                posicao: "SUP",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 }
            }
        ];

        const container = document.getElementById('time-amigos');

        jogadores.forEach(jogador => {
            // Calcula o Overall
            const st = jogador.stats;
            const soma = st.mir + st.mov + st.noc + st.uti + st.imp + st.clu;
            const overall = Math.round(soma / 6);

            // Algoritmo de classificação da carta
            let categoria = "";
            if (overall >= 80) {
                categoria = "ouro";
            } else if (overall >= 60) {
                categoria = "prata";
            } else {
                categoria = "bronze";
            }

            // Esqueleto da Carta Final
            const cartaHTML = `
                <div class="cs-card ${categoria}">
                    <div class="card-header">
                        <div class="header-left">
                            <div class="overall">${overall}</div>
                            <div class="position">${jogador.posicao}</div>
                        </div>
                        <div class="header-right">
                            <img class="flag" src="https://flagcdn.com/w40/br.png" alt="Brasil">
                        </div>
                    </div>
                    <div class="card-image">
                        <img src="${jogador.foto}" alt="Foto de ${jogador.nome}">
                    </div>
                    <div class="card-name">${jogador.nome}</div>
                    <div class="card-stats">
                        <div class="stat-column">
                            <div class="stat-row"><span class="stat-value">${st.mir}</span><span class="stat-label">MIR</span></div>
                            <div class="stat-row"><span class="stat-value">${st.mov}</span><span class="stat-label">MOV</span></div>
                            <div class="stat-row"><span class="stat-value">${st.noc}</span><span class="stat-label">NOC</span></div>
                        </div>
                        <div class="stat-column">
                            <div class="stat-row"><span class="stat-value">${st.uti}</span><span class="stat-label">UTI</span></div>
                            <div class="stat-row"><span class="stat-value">${st.imp}</span><span class="stat-label">IMP</span></div>
                            <div class="stat-row"><span class="stat-value">${st.clu}</span><span class="stat-label">CLU</span></div>
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML += cartaHTML;
        });
    </script>
</body>

</html>
