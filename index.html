<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartas CS - O Esquadrão</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a24;
            padding: 50px 20px;
        }

        h1 {
            text-align: center;
            font-family: 'Teko', sans-serif;
            font-size: 50px;
            letter-spacing: 2px;
            margin-bottom: 40px;
            color: #f7d571;
        }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1600px;
            margin: 0 auto;
        }

        .cs-card {
            width: 253px;
            height: 355px;
            position: relative;
            font-family: 'Teko', sans-serif;
            transition: transform 0.25s, filter 0.25s;
            cursor: default;
        }

        .cs-card:hover {
            transform: translateY(-10px) scale(1.04);
            filter: drop-shadow(0 18px 36px rgba(0, 0, 0, 0.9));
        }

        .card-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            z-index: 0;
        }

/* 1. OVERALL: Cor mais escura para contraste extremo */
        .card-overall {
            position: absolute;
            top: 20%;  
            left: 15%; 
            width: 20%;
            text-align: center;
            font-size: 44px; 
            font-weight: 700;
            line-height: 0.8;
            color: #150f0a; /* Quase preto puro */
            z-index: 3;
        }

/* 2. POSIÇÃO */
        .card-position {
            position: absolute;
            top: 31%; 
            left: 15%;
            width: 20%;
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #150f0a;
            z-index: 3;
            line-height: 1;
        }

        /* FOTO DO JOGADOR */
        .card-image {
            position: absolute;
            top: 12%;
            bottom: 35%;
            /* Ajustado para encaixar acima do nome */
            left: 28%;
            right: 5%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 2;
            overflow: hidden;
        }

        .card-image img,
        .card-image svg {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            display: block;
        }

/* 3. NOME */
        .card-name {
            position: absolute;
            top: 57%; 
            left: 5%;
            right: 5%;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #150f0a;
            z-index: 3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.15;
        }

/* 4. ATRIBUTOS (HORIZONTAL): Paredes laterais espremidas */
        .card-stats-row {
            position: absolute;
            top: 66%; 
            left: 12%;  /* Aumentado de 8% para 12% (empurra pra dentro) */
            right: 12%; /* Aumentado de 8% para 12% (empurra pra dentro) */
            display: flex;
            justify-content: space-between; 
            z-index: 3;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px; /* Grudou um pouco mais o número da letra */
        }

        .stat-label {
            font-weight: 600;
            font-size: 12px; /* Diminuído de 13px para 12px */
            letter-spacing: 0px; /* Tiramos o espaçamento para economizar largura */
            color: #150f0a;
            line-height: 1;
        }

        .stat-value {
            font-weight: 700;
            font-size: 17px; /* Diminuído de 18px para 17px */
            color: #150f0a;
            line-height: 1;
        }

/* 5. RODAPÉ (Bandeiras e Escudos): Subiram para a ponta do escudo */
        .card-bottom-icons {
            position: absolute;
            top: 77%; /* Subiu de 86.5% para 77% para entrar na carta */
            left: 10%;
            right: 10%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; 
            z-index: 3;
        }

        .card-bottom-icons img {
            object-fit: contain;
        }

        .flag-icon {
            width: 28px;
            height: 18px;
            border-radius: 2px;
        }

        .club-icon {
            width: 22px;
            height: auto;
        }

/* 5. TEXTO DO RODAPÉ (FUT CARDS) */
        .fut-text {
            font-size: 11px;
            font-weight: 700;
            line-height: 0.9;
            text-align: center;
            color: #150f0a;
        }
    </style>
</head>

<body>

    <h1>Votação Jogo Coop - CS2</h1>
    <div class="cards-container" id="time-amigos"></div>

    <script>
        const SILHUETA = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" width="85" height="119">
            <defs>
                <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="rgba(59,35,19,0.28)"/>
                    <stop offset="100%" stop-color="rgba(59,35,19,0.07)"/>
                </linearGradient>
            </defs>
            <ellipse cx="50" cy="32" rx="19" ry="21" fill="url(#sg)"/>
            <rect x="43" y="50" width="14" height="12" rx="3" fill="url(#sg)"/>
            <path d="M8 140 Q8 88 30 76 Q41 71 50 71 Q59 71 70 76 Q92 88 92 140Z" fill="url(#sg)"/>
        </svg>`;

        const jogadores = [
            { nome: "Negaolol", posicao: "ENT", foto: null, stats: { mir: 88, mov: 85, noc: 92, uti: 89, imp: 86, clu: 90 } },
            { nome: "Alisson", posicao: "AWP", foto: null, stats: { mir: 90, mov: 82, noc: 85, uti: 80, imp: 91, clu: 87 } },
            { nome: "Kaue", posicao: "ENT", foto: null, stats: { mir: 92, mov: 88, noc: 80, uti: 75, imp: 90, clu: 78 } },
            { nome: "Mathias", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Osvaldo", posicao: "SUP", foto: null, stats: { mir: 55, mov: 50, noc: 52, uti: 58, imp: 50, clu: 55 } },
            { nome: "Indianolol", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Modafoquin", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "GGelo", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Wandher", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Psicologo", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } }
        ];

        const bgMap = { ouro: 'ouro.jpg', prata: 'prata.jpg', bronze: 'bronze.jpg' };
        const container = document.getElementById('time-amigos');

        jogadores.forEach(jogador => {
            const st = jogador.stats;
            const overall = Math.round((st.mir + st.mov + st.noc + st.uti + st.imp + st.clu) / 6);
            const categoria = overall >= 80 ? "ouro" : overall >= 60 ? "prata" : "bronze";
            const fotoHTML = jogador.foto
                ? `<img src="${jogador.foto}" alt="${jogador.nome}" onerror="this.style.display='none'">`
                : SILHUETA;

            container.innerHTML += `
                <div class="cs-card">
                    <img class="card-bg" src="${bgMap[categoria]}" alt="">

                    <!-- TOPO ESQUERDO -->
                    <div class="card-overall">${overall}</div>
                    <div class="card-position">${jogador.posicao}</div>
                    
                    <!-- FOTO E NOME -->
                    <div class="card-image">${fotoHTML}</div>
                    <div class="card-name">${jogador.nome}</div>

                    <!-- LINHA ÚNICA DE ATRIBUTOS -->
                    <div class="card-stats-row">
                        <div class="stat-item"><span class="stat-label">MIR</span><span class="stat-value">${st.mir}</span></div>
                        <div class="stat-item"><span class="stat-label">MOV</span><span class="stat-value">${st.mov}</span></div>
                        <div class="stat-item"><span class="stat-label">NOC</span><span class="stat-value">${st.noc}</span></div>
                        <div class="stat-item"><span class="stat-label">UTI</span><span class="stat-value">${st.uti}</span></div>
                        <div class="stat-item"><span class="stat-label">IMP</span><span class="stat-value">${st.imp}</span></div>
                        <div class="stat-item"><span class="stat-label">CLU</span><span class="stat-value">${st.clu}</span></div>
                    </div>

                    <!-- RODAPÉ (Bandeira, FUT, Escudo) -->
                    <div class="card-bottom-icons">
                        <img class="flag-icon" src="https://flagcdn.com/w40/br.png" alt="Brasil">
                        <div class="fut-text">FUT<br>CARDS</div>
                        <img class="club-icon" src="https://i.imgur.com/gK1qO8a.png" alt="Time">
                    </div>
                </div>`;
        });
    </script>
</body>

</html>
