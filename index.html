<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartas CS - O Esquadrão</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a24;
            padding: 50px 20px;
        }

        h1 {
            text-align: center;
            font-family: 'Teko', sans-serif;
            font-size: 50px;
            letter-spacing: 2px;
            margin-bottom: 40px;
            color: #f7d571;
        }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1600px;
            margin: 0 auto;
        }

        /*
         * Template original: 422 x 591 px
         * Exibição: 211 x 295 px (50%)
         * Todos os % abaixo são relativos a esses valores.
         *
         * Zonas mapeadas por pixel:
         *   Overall+pos+flag : left 2-21%, top 8-32%
         *   Foto             : left 22-98%, top 0-60%
         *   Nome             : top 61-68%, centralizado
         *   Stats            : top 68-88%, divisória vertical em 46%
         */
        .cs-card {
            width: 211px;
            height: 295px;
            position: relative;
            font-family: 'Teko', sans-serif;
            transition: transform 0.25s, filter 0.25s;
            cursor: default;
        }

        .cs-card:hover {
            transform: translateY(-10px) scale(1.04);
            filter: drop-shadow(0 16px 32px rgba(0, 0, 0, 0.85));
        }

        /* Template de fundo — usa object-fit:fill para cobrir 100% sem cortar */
        .card-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            display: block;
            z-index: 0;
        }

        /* Overall + Posição + Bandeira
           No template: traço aparece em y≈8% e o bloco vai até y≈32%
           x: começa em ~2%, vai até ~21% */
        .card-top-left {
            position: absolute;
            top: 8%;
            left: 4%;
            width: 19%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 3;
            color: #2b2214;
            line-height: 1;
        }

        .overall {
            font-size: 34px;
            font-weight: 700;
            line-height: 1;
        }

        .position {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.8px;
            margin-top: 1px;
        }

        .flag {
            width: 22px;
            height: 14px;
            object-fit: cover;
            border-radius: 2px;
            margin-top: 4px;
        }

        /* Foto do jogador
           Ocupa: left 22% até 98%, top 2% até 60% */
        .card-image {
            position: absolute;
            top: 2%;
            left: 22%;
            right: 2%;
            height: 58%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 2;
            overflow: hidden;
        }

        .card-image img,
        .card-image svg {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            display: block;
        }

        /* Nome
           No template a linha divisória horizontal está em y≈61%
           Nome fica logo acima dela */
        .card-name {
            position: absolute;
            top: 61%;
            width: 100%;
            text-align: center;
            font-size: 17px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #2b2214;
            z-index: 3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 6px;
            line-height: 1.2;
        }

        /* Stats
           Começam em y≈68%, linha vertical em x≈46%
           Coluna esq: x 6-44%  |  Coluna dir: x 48-94% */
        .card-stats {
            position: absolute;
            top: 68%;
            left: 6%;
            width: 88%;
            display: flex;
            justify-content: space-between;
            z-index: 3;
        }

        .stat-column {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: #2b2214;
            line-height: 1.2;
        }

        .stat-value {
            font-weight: 700;
            width: 18px;
            text-align: right;
        }

        .stat-label {
            font-weight: 400;
            font-size: 10px;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>

    <h1>Votação Jogo Coop - CS2</h1>
    <div class="cards-container" id="time-amigos"></div>

    <script>
        const SILHUETA = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" width="90" height="126">
            <defs>
                <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="rgba(43,34,20,0.30)"/>
                    <stop offset="100%" stop-color="rgba(43,34,20,0.08)"/>
                </linearGradient>
            </defs>
            <ellipse cx="50" cy="32" rx="19" ry="21" fill="url(#sg)"/>
            <rect x="43" y="50" width="14" height="12" rx="3" fill="url(#sg)"/>
            <path d="M8 140 Q8 88 30 76 Q41 71 50 71 Q59 71 70 76 Q92 88 92 140Z" fill="url(#sg)"/>
        </svg>`;

        const jogadores = [
            { nome: "Negaolol", posicao: "ENT", foto: null, stats: { mir: 88, mov: 85, noc: 92, uti: 89, imp: 86, clu: 90 } },
            { nome: "Alisson", posicao: "AWP", foto: null, stats: { mir: 90, mov: 82, noc: 85, uti: 80, imp: 91, clu: 87 } },
            { nome: "Kaue", posicao: "ENT", foto: null, stats: { mir: 92, mov: 88, noc: 80, uti: 75, imp: 90, clu: 78 } },
            { nome: "Mathias", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Osvaldo", posicao: "SUP", foto: null, stats: { mir: 55, mov: 50, noc: 52, uti: 58, imp: 50, clu: 55 } },
            { nome: "Indianolol", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Modafoquin", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "GGelo", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Wandher", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Psicologo", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } }
        ];

        const bgMap = { ouro: 'ouro.jpg', prata: 'prata.jpg', bronze: 'bronze.jpg' };
        const container = document.getElementById('time-amigos');

        jogadores.forEach(jogador => {
            const st = jogador.stats;
            const overall = Math.round((st.mir + st.mov + st.noc + st.uti + st.imp + st.clu) / 6);
            const categoria = overall >= 80 ? "ouro" : overall >= 60 ? "prata" : "bronze";
            const fotoHTML = jogador.foto
                ? `<img src="${jogador.foto}" alt="${jogador.nome}" onerror="this.style.display='none'">`
                : SILHUETA;

            container.innerHTML += `
                <div class="cs-card">
                    <img class="card-bg" src="${bgMap[categoria]}" alt="">

                    <div class="card-top-left">
                        <div class="overall">${overall}</div>
                        <div class="position">${jogador.posicao}</div>
                        <img class="flag" src="https://flagcdn.com/w40/br.png" alt="Brasil">
                    </div>

                    <div class="card-image">${fotoHTML}</div>

                    <div class="card-name">${jogador.nome}</div>

                    <div class="card-stats">
                        <div class="stat-column">
                            <div class="stat-row"><span class="stat-value">${st.mir}</span><span class="stat-label">MIR</span></div>
                            <div class="stat-row"><span class="stat-value">${st.mov}</span><span class="stat-label">MOV</span></div>
                            <div class="stat-row"><span class="stat-value">${st.noc}</span><span class="stat-label">NOC</span></div>
                        </div>
                        <div class="stat-column">
                            <div class="stat-row"><span class="stat-value">${st.uti}</span><span class="stat-label">UTI</span></div>
                            <div class="stat-row"><span class="stat-value">${st.imp}</span><span class="stat-label">IMP</span></div>
                            <div class="stat-row"><span class="stat-value">${st.clu}</span><span class="stat-label">CLU</span></div>
                        </div>
                    </div>
                </div>`;
        });
    </script>
</body>

</html>
