<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartas CS - O Esquadrão</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a24;
            padding: 50px 20px;
        }

        h1 {
            text-align: center;
            font-family: 'Teko', sans-serif;
            font-size: 50px;
            letter-spacing: 2px;
            margin-bottom: 40px;
            color: #f7d571;
        }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1600px;
            margin: 0 auto;
        }

        /*
         * Template 422x591px — zonas mapeadas por pixel:
         *
         *  Barrinha 1 (topo overall) : y=182px = 30.8%
         *  Barrinha 2 (base posição) : y=232px = 39.3%
         *  Bandeira                  : entre barrinha2 e a listra (~42%)
         *  Grande listra             : y=148-304px (25-51%)
         *  Linha horiz. divisória    : y=361px = 61.1%
         *  Nome                      : logo acima de y=361 → ~57-60%
         *  Stats início              : y~400px = 67.7%
         *  Linha vertical stats      : x=195px = 46.2%
         *  Borda esq. da carta       : x=49px  = 11.6%
         *
         *  Overall fica ACIMA da barrinha1 → top ~11%, logo abaixo do topo da carta
         *  Posição fica ENTRE as barrinhas → top ~31%
         *  Bandeira fica ABAIXO da barrinha2 → top ~40%
         *
         * Exibindo em 253x355px (60% do original)
         */
        .cs-card {
            width: 253px;
            height: 355px;
            position: relative;
            font-family: 'Teko', sans-serif;
            transition: transform 0.25s, filter 0.25s;
            cursor: default;
        }

        .cs-card:hover {
            transform: translateY(-10px) scale(1.04);
            filter: drop-shadow(0 18px 36px rgba(0, 0, 0, 0.9));
        }

        .card-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            display: block;
            z-index: 0;
        }

        /* Overall: acima da barrinha1 (y=30.8%)
           Fica em top≈11% para o número ficar entre o topo e a barrinha */
        .card-overall {
            position: absolute;
            top: 10%;
            left: 11.6%;
            width: 19%;
            text-align: center;
            font-size: 42px;
            font-weight: 700;
            line-height: 1;
            color: #2b2214;
            z-index: 3;
        }

        /* Posição: entre barrinha1 (30.8%) e barrinha2 (39.3%)
           Centro das barrinhas ≈ 35% */
        .card-position {
            position: absolute;
            top: 31.5%;
            left: 11.6%;
            width: 19%;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.8px;
            color: #2b2214;
            z-index: 3;
            line-height: 1;
        }

        /* Bandeira: abaixo da barrinha2 (39.3%) */
        .card-flag {
            position: absolute;
            top: 40.5%;
            left: 11.6%;
            width: 19%;
            display: flex;
            justify-content: center;
            z-index: 3;
        }

        .card-flag img {
            width: 26px;
            height: 16px;
            object-fit: cover;
            border-radius: 2px;
        }

        /* Foto: direita do bloco overall, até a linha divisória
           left≈32%, top≈7%, right≈3%, height≈53% */
        .card-image {
            position: absolute;
            top: 7%;
            left: 32%;
            right: 3%;
            height: 53%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 2;
            overflow: hidden;
        }

        .card-image img,
        .card-image svg {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            display: block;
        }

        /* Nome: logo acima da linha divisória (y=61.1%)
           Posicionado em ~57% para ficar visível acima da listra */
        .card-name {
            position: absolute;
            top: 57%;
            left: 11.6%;
            right: 3%;
            text-align: center;
            font-size: 21px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #2b2214;
            z-index: 3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.15;
        }

        /* Stats — coluna esquerda: left=11.6%, top=67.7%
           Coluna direita: left=46.2%, top=67.7% */
        .stat-col-left {
            position: absolute;
            top: 67%;
            left: 11.6%;
            display: flex;
            flex-direction: column;
            gap: 1px;
            z-index: 3;
        }

        .stat-col-right {
            position: absolute;
            top: 67%;
            left: 48%;
            display: flex;
            flex-direction: column;
            gap: 1px;
            z-index: 3;
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 15px;
            color: #2b2214;
            line-height: 1.25;
        }

        .stat-value {
            font-weight: 700;
            width: 20px;
            text-align: right;
        }

        .stat-label {
            font-weight: 400;
            font-size: 11px;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>

    <h1>Votação Jogo Coop - CS2</h1>
    <div class="cards-container" id="time-amigos"></div>

    <script>
        const SILHUETA = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" width="85" height="119">
            <defs>
                <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="rgba(43,34,20,0.28)"/>
                    <stop offset="100%" stop-color="rgba(43,34,20,0.07)"/>
                </linearGradient>
            </defs>
            <ellipse cx="50" cy="32" rx="19" ry="21" fill="url(#sg)"/>
            <rect x="43" y="50" width="14" height="12" rx="3" fill="url(#sg)"/>
            <path d="M8 140 Q8 88 30 76 Q41 71 50 71 Q59 71 70 76 Q92 88 92 140Z" fill="url(#sg)"/>
        </svg>`;

        const jogadores = [
            { nome: "Negaolol", posicao: "ENT", foto: null, stats: { mir: 88, mov: 85, noc: 92, uti: 89, imp: 86, clu: 90 } },
            { nome: "Alisson", posicao: "AWP", foto: null, stats: { mir: 90, mov: 82, noc: 85, uti: 80, imp: 91, clu: 87 } },
            { nome: "Kaue", posicao: "ENT", foto: null, stats: { mir: 92, mov: 88, noc: 80, uti: 75, imp: 90, clu: 78 } },
            { nome: "Mathias", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Osvaldo", posicao: "SUP", foto: null, stats: { mir: 55, mov: 50, noc: 52, uti: 58, imp: 50, clu: 55 } },
            { nome: "Indianolol", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Modafoquin", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "GGelo", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Wandher", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Psicologo", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } }
        ];

        const bgMap = { ouro: 'ouro.jpg', prata: 'prata.jpg', bronze: 'bronze.jpg' };
        const container = document.getElementById('time-amigos');

        jogadores.forEach(jogador => {
            const st = jogador.stats;
            const overall = Math.round((st.mir + st.mov + st.noc + st.uti + st.imp + st.clu) / 6);
            const categoria = overall >= 80 ? "ouro" : overall >= 60 ? "prata" : "bronze";
            const fotoHTML = jogador.foto
                ? `<img src="${jogador.foto}" alt="${jogador.nome}" onerror="this.style.display='none'">`
                : SILHUETA;

            container.innerHTML += `
                <div class="cs-card">
                    <img class="card-bg" src="${bgMap[categoria]}" alt="">

                    <div class="card-overall">${overall}</div>
                    <div class="card-position">${jogador.posicao}</div>
                    <div class="card-flag"><img src="https://flagcdn.com/w40/br.png" alt="Brasil"></div>

                    <div class="card-image">${fotoHTML}</div>

                    <div class="card-name">${jogador.nome}</div>

                    <div class="stat-col-left">
                        <div class="stat-row"><span class="stat-value">${st.mir}</span><span class="stat-label">MIR</span></div>
                        <div class="stat-row"><span class="stat-value">${st.mov}</span><span class="stat-label">MOV</span></div>
                        <div class="stat-row"><span class="stat-value">${st.noc}</span><span class="stat-label">NOC</span></div>
                    </div>
                    <div class="stat-col-right">
                        <div class="stat-row"><span class="stat-value">${st.uti}</span><span class="stat-label">UTI</span></div>
                        <div class="stat-row"><span class="stat-value">${st.imp}</span><span class="stat-label">IMP</span></div>
                        <div class="stat-row"><span class="stat-value">${st.clu}</span><span class="stat-label">CLU</span></div>
                    </div>
                </div>`;
        });
    </script>
</body>

</html>
