<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartas CS - O Esquadrão</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a24;
            padding: 50px 20px;
        }

        h1 {
            text-align: center;
            font-family: 'Teko', sans-serif;
            font-size: 50px;
            letter-spacing: 2px;
            margin-bottom: 40px;
            color: #f7d571;
        }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1600px;
            margin: 0 auto;
        }

        .cs-card {
            width: 253px;
            height: 355px;
            position: relative;
            font-family: 'Teko', sans-serif;
            transition: transform 0.25s, filter 0.25s;
            cursor: default;
        }

        .cs-card:hover {
            transform: translateY(-10px) scale(1.04);
            filter: drop-shadow(0 18px 36px rgba(0, 0, 0, 0.9));
        }

        .card-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            z-index: 0;
        }

/* 1. OVERALL: Centralizado no eixo das linhas */
        .card-overall {
            position: absolute;
            top: 17.5%;
            left: 14%; /* Puxado para a direita */
            width: 18%; /* Espaço reduzido para centralizar perfeito nas linhas */
            text-align: center;
            font-size: 46px;
            font-weight: 700;
            line-height: 0.8;
            color: #2b2214;
            z-index: 3;
        }

/* 2. POSIÇÃO: Acompanhando o Overall */
        .card-position {
            position: absolute;
            top: 35%;
            left: 14%;
            width: 18%;
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #2b2214;
            z-index: 3;
            line-height: 1;
        }

/* 3. BANDEIRA: Acompanhando o eixo */
        .card-flag {
            position: absolute;
            top: 42.5%;
            left: 14%;
            width: 18%;
            display: flex;
            justify-content: center;
            z-index: 3;
        }

        .card-flag img {
            width: 26px; 
            height: 16px;
            object-fit: cover;
            border-radius: 2px;
        }

        /* FOTO: Base cravada na linha divisória horizontal */
        .card-image {
            position: absolute;
            top: 10%;
            bottom: 39.5%;
            /* Força a imagem a não passar da linha divisória */
            left: 32%;
            right: 5%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 2;
            overflow: hidden;
        }

        .card-image img,
        .card-image svg {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            display: block;
        }

/* 4. NOME: Movido para cima */
        .card-name {
            position: absolute;
            top: 55.5%; /* Diminuído de 57/58% para subir */
            left: 5%;
            right: 5%;
            text-align: center;
            font-size: 21px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #2b2214;
            z-index: 3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.15;
        }

/* 5. STATS ESQUERDA: Subiu e foi mais para a direita (perto da barra vertical) */
        .stat-col-left {
            position: absolute;
            top: 64.5%; /* Diminuído para subir */
            left: 20%;  /* Aumentado para ir para a direita */
            display: flex;
            flex-direction: column;
            gap: 2px;
            z-index: 3;
        }

        /* 6. STATS DIREITA: Subiu e ajustou a distância */
        .stat-col-right {
            position: absolute;
            top: 64.5%; /* Diminuído para subir */
            left: 52%;  /* Puxado um pouco para a direita também */
            display: flex;
            flex-direction: column;
            gap: 2px;
            z-index: 3;
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: 6px;
            /* Mais respiro entre o número e a letra */
            line-height: 1.1;
        }

        .stat-value {
            font-weight: 700;
            font-size: 20px;
            /* Números maiores, padrão FIFA */
            width: 22px;
            text-align: right;
            color: #2b2214;
        }

        .stat-label {
            font-weight: 600;
            font-size: 15px;
            /* Letras levemente menores que o número */
            letter-spacing: 0.5px;
            color: #2b2214;
        }
    </style>
</head>

<body>

    <h1>Votação Jogo Coop - CS2</h1>
    <div class="cards-container" id="time-amigos"></div>

    <script>
        const SILHUETA = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" width="85" height="119">
            <defs>
                <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="rgba(43,34,20,0.28)"/>
                    <stop offset="100%" stop-color="rgba(43,34,20,0.07)"/>
                </linearGradient>
            </defs>
            <ellipse cx="50" cy="32" rx="19" ry="21" fill="url(#sg)"/>
            <rect x="43" y="50" width="14" height="12" rx="3" fill="url(#sg)"/>
            <path d="M8 140 Q8 88 30 76 Q41 71 50 71 Q59 71 70 76 Q92 88 92 140Z" fill="url(#sg)"/>
        </svg>`;

        const jogadores = [
            { nome: "Negaolol", posicao: "ENT", foto: null, stats: { mir: 88, mov: 85, noc: 92, uti: 89, imp: 86, clu: 90 } },
            { nome: "Alisson", posicao: "AWP", foto: null, stats: { mir: 90, mov: 82, noc: 85, uti: 80, imp: 91, clu: 87 } },
            { nome: "Kaue", posicao: "ENT", foto: null, stats: { mir: 92, mov: 88, noc: 80, uti: 75, imp: 90, clu: 78 } },
            { nome: "Mathias", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Osvaldo", posicao: "SUP", foto: null, stats: { mir: 55, mov: 50, noc: 52, uti: 58, imp: 50, clu: 55 } },
            { nome: "Indianolol", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Modafoquin", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "GGelo", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Wandher", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Psicologo", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } }
        ];

        const bgMap = { ouro: 'ouro.jpg', prata: 'prata.jpg', bronze: 'bronze.jpg' };
        const container = document.getElementById('time-amigos');

        jogadores.forEach(jogador => {
            const st = jogador.stats;
            const overall = Math.round((st.mir + st.mov + st.noc + st.uti + st.imp + st.clu) / 6);
            const categoria = overall >= 80 ? "ouro" : overall >= 60 ? "prata" : "bronze";
            const fotoHTML = jogador.foto
                ? `<img src="${jogador.foto}" alt="${jogador.nome}" onerror="this.style.display='none'">`
                : SILHUETA;

            container.innerHTML += `
                <div class="cs-card">
                    <img class="card-bg" src="${bgMap[categoria]}" alt="">

                    <div class="card-overall">${overall}</div>
                    <div class="card-position">${jogador.posicao}</div>
                    <div class="card-flag"><img src="https://flagcdn.com/w40/br.png" alt="Brasil"></div>

                    <div class="card-image">${fotoHTML}</div>

                    <div class="card-name">${jogador.nome}</div>

                    <div class="stat-col-left">
                        <div class="stat-row"><span class="stat-value">${st.mir}</span><span class="stat-label">MIR</span></div>
                        <div class="stat-row"><span class="stat-value">${st.mov}</span><span class="stat-label">MOV</span></div>
                        <div class="stat-row"><span class="stat-value">${st.noc}</span><span class="stat-label">NOC</span></div>
                    </div>
                    <div class="stat-col-right">
                        <div class="stat-row"><span class="stat-value">${st.uti}</span><span class="stat-label">UTI</span></div>
                        <div class="stat-row"><span class="stat-value">${st.imp}</span><span class="stat-label">IMP</span></div>
                        <div class="stat-row"><span class="stat-value">${st.clu}</span><span class="stat-label">CLU</span></div>
                    </div>
                </div>`;
        });
    </script>
</body>

</html>
