<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartas CS - O Esquadrão</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a24;
            padding: 50px 20px;
            font-family: Arial, sans-serif;
            color: white;
        }

        h1 {
            text-align: center;
            font-family: 'Teko', sans-serif;
            font-size: 50px;
            letter-spacing: 2px;
            margin-bottom: 40px;
            color: #f7d571;
        }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1600px;
            margin: 0 auto;
        }

        /*
         * O template JPG tem proporção ~420x560px (3:4).
         * Usamos 210x280 como tamanho de exibição (50% do original).
         * Todos os elementos são posicionados em % para escalar junto.
         */
        .cs-card {
            width: 210px;
            height: 280px;
            position: relative;
            font-family: 'Teko', sans-serif;
            transition: transform 0.25s, box-shadow 0.25s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            cursor: default;
            border-radius: 10px;
            overflow: hidden;
        }

        .cs-card:hover {
            transform: translateY(-10px) scale(1.04);
            box-shadow: 0 22px 50px rgba(0, 0, 0, 0.9);
        }

        /* Imagem de fundo da carta ocupa 100% */
        .card-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            display: block;
            z-index: 0;
        }

        /* ---- COLUNA SUPERIOR ESQUERDA: overall + posição + bandeira ----
           No template, essa área fica em ~10% left, ~12% top             */
        .card-top-left {
            position: absolute;
            top: 12%;
            left: 8%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 3;
            color: #2b2214;
            line-height: 1;
        }

        .overall {
            font-size: 38px;
            font-weight: 700;
            line-height: 1;
        }

        .position {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-top: 1px;
        }

        .flag {
            width: 24px;
            height: 15px;
            object-fit: cover;
            border-radius: 2px;
            margin-top: 4px;
        }

        /* ---- FOTO: área central superior, à direita da coluna esq ----
           Ocupa do topo até ~57% da altura (acima da linha divisória)    */
        .card-image {
            position: absolute;
            top: 4%;
            left: 28%;
            right: 4%;
            height: 52%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 2;
            overflow: hidden;
        }

        .card-image img,
        .card-image svg {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            display: block;
        }

        /* ---- NOME: centralizado, logo acima da linha divisória (~58%) ---- */
        .card-name {
            position: absolute;
            top: 57%;
            width: 100%;
            text-align: center;
            font-size: 19px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #2b2214;
            z-index: 3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 8px;
        }

        /* ---- ATRIBUTOS: abaixo da linha divisória (~67%) ---- */
        .card-stats {
            position: absolute;
            top: 67%;
            width: 82%;
            left: 9%;
            display: flex;
            justify-content: space-between;
            z-index: 3;
        }

        .stat-column {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            color: #2b2214;
            line-height: 1.15;
        }

        .stat-value {
            font-weight: 700;
            width: 20px;
            text-align: right;
        }

        .stat-label {
            font-weight: 400;
            font-size: 11px;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>

    <h1>Votação Jogo Coop - CS2</h1>
    <div class="cards-container" id="time-amigos"></div>

    <script>
        const SILHUETA = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 155" width="100" height="130">
            <defs>
                <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="rgba(43,34,20,0.30)"/>
                    <stop offset="100%" stop-color="rgba(43,34,20,0.10)"/>
                </linearGradient>
            </defs>
            <ellipse cx="60" cy="36" rx="21" ry="23" fill="url(#sg)"/>
            <rect x="52" y="55" width="16" height="13" rx="4" fill="url(#sg)"/>
            <path d="M14 155 Q14 98 38 86 Q50 81 60 81 Q70 81 82 86 Q106 98 106 155Z" fill="url(#sg)"/>
        </svg>`;

        const jogadores = [
            { nome: "Negaolol", posicao: "ENT", foto: null, stats: { mir: 88, mov: 85, noc: 92, uti: 89, imp: 86, clu: 90 } },
            { nome: "Alisson", posicao: "AWP", foto: null, stats: { mir: 90, mov: 82, noc: 85, uti: 80, imp: 91, clu: 87 } },
            { nome: "Kaue", posicao: "ENT", foto: null, stats: { mir: 92, mov: 88, noc: 80, uti: 75, imp: 90, clu: 78 } },
            { nome: "Mathias", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Osvaldo", posicao: "SUP", foto: null, stats: { mir: 55, mov: 50, noc: 52, uti: 58, imp: 50, clu: 55 } },
            { nome: "Indianolol", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Modafoquin", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "GGelo", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Wandher", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } },
            { nome: "Psicologo", posicao: "SUP", foto: null, stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 } }
        ];

        const bgMap = { ouro: 'ouro.jpg', prata: 'prata.jpg', bronze: 'bronze.jpg' };
        const container = document.getElementById('time-amigos');

        jogadores.forEach(jogador => {
            const st = jogador.stats;
            const overall = Math.round((st.mir + st.mov + st.noc + st.uti + st.imp + st.clu) / 6);
            const categoria = overall >= 80 ? "ouro" : overall >= 60 ? "prata" : "bronze";

            const fotoHTML = jogador.foto
                ? `<img src="${jogador.foto}" alt="${jogador.nome}" onerror="this.style.display='none'">`
                : SILHUETA;

            container.innerHTML += `
                <div class="cs-card">
                    <img class="card-bg" src="${bgMap[categoria]}" alt="">

                    <div class="card-top-left">
                        <div class="overall">${overall}</div>
                        <div class="position">${jogador.posicao}</div>
                        <img class="flag" src="https://flagcdn.com/w40/br.png" alt="Brasil">
                    </div>

                    <div class="card-image">${fotoHTML}</div>

                    <div class="card-name">${jogador.nome}</div>

                    <div class="card-stats">
                        <div class="stat-column">
                            <div class="stat-row"><span class="stat-value">${st.mir}</span><span class="stat-label">MIR</span></div>
                            <div class="stat-row"><span class="stat-value">${st.mov}</span><span class="stat-label">MOV</span></div>
                            <div class="stat-row"><span class="stat-value">${st.noc}</span><span class="stat-label">NOC</span></div>
                        </div>
                        <div class="stat-column">
                            <div class="stat-row"><span class="stat-value">${st.uti}</span><span class="stat-label">UTI</span></div>
                            <div class="stat-row"><span class="stat-value">${st.imp}</span><span class="stat-label">IMP</span></div>
                            <div class="stat-row"><span class="stat-value">${st.clu}</span><span class="stat-label">CLU</span></div>
                        </div>
                    </div>
                </div>`;
        });
    </script>
</body>

</html>
