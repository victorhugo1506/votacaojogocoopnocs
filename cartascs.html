 !DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votacao Jogo Coop no CS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600&display=swap');

        body {
            background-color: #1a1a24;
            margin: 0;
            padding: 50px;
            font-family: Arial, sans-serif;
            color: white;
        }

        h1 {
            text-align: center;
            font-family: 'Teko', sans-serif;
            font-size: 50px;
            letter-spacing: 2px;
            margin-bottom: 40px;
            color: #f7d571;
        }

        /* Container responsivo que organiza as 10 cartas */
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1600px;
            margin: 0 auto;
        }

        .cs-card {
            width: 320px;
            height: 480px;
            background: linear-gradient(135deg, #2b2b36 0%, #15151c 100%);
            border: 2px solid #c7a75c;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            color: #fff;
            transition: transform 0.2s;
            /* Efeito de zoom ao passar o mouse */
        }

        .cs-card:hover {
            transform: translateY(-10px);
        }

        /* Resto do Design da Carta */
        .card-header {
            display: flex;
            justify-content: space-between;
            padding: 20px 20px 0 20px;
            position: relative;
            z-index: 2;
        }

        .header-left {
            text-align: center;
        }

        .overall {
            font-family: 'Teko', sans-serif;
            font-size: 55px;
            font-weight: 600;
            line-height: 0.8;
            color: #f7d571;
        }

        .position {
            font-size: 16px;
            font-weight: bold;
            margin-top: 5px;
            color: #ccc;
        }

        .header-right {
            text-align: right;
            font-size: 16px;
            font-weight: bold;
            color: #ccc;
            line-height: 1.4;
        }

        .card-image {
            width: 100%;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-top: -30px;
            position: relative;
            z-index: 1;
        }

        .card-image img {
            max-height: 100%;
            max-width: 90%;
            object-fit: contain;
        }

        .card-name {
            font-family: 'Teko', sans-serif;
            font-size: 32px;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 3px;
            margin: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 5px;
            margin-left: 20px;
            margin-right: 20px;
        }

        .card-stats {
            display: flex;
            justify-content: space-around;
            padding: 10px 20px;
        }

        .stat-column {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-family: 'Teko', sans-serif;
        }

        .stat-value {
            font-weight: 600;
            font-size: 24px;
            color: #f7d571;
            width: 30px;
            text-align: right;
        }

        .stat-label {
            font-weight: normal;
            color: #fff;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <h1>Votacao Jogo Coop - CS2</h1>

    <!-- O Container vazio onde o JS vai injetar as cartas -->
    <div class="cards-container" id="time-amigos"></div>

    <script>
        // 1. Local para adicionar os infames
        const jogadores = [
            {
                nome: "Negaolol",
                posicao: "Entry",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 88, mov: 85, noc: 92, uti: 89, imp: 86, clu: 90 }
            },
            {
                nome: "Alisson To Certo",
                posicao: "Suporte",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 90, mov: 82, noc: 85, uti: 80, imp: 91, clu: 87 }
            },
            {
                nome: "Kaue Superidol",
                posicao: "Entry",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 92, mov: 88, noc: 80, uti: 75, imp: 90, clu: 78 }
            },
            {
                nome: "Mathias Flinstons",
                posicao: "Ancora",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 }
            },
            {
                nome: "Stalosvaldo",
                posicao: "IGL",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 }
            },
            {
                nome: "Indianolol",
                posicao: "IGL",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 }
            },
            {
                nome: "Modafoquin Bilas",
                posicao: "Ancora",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 }
            },
            {
                nome: "GGelo",
                posicao: "Ancora",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 }
            },
            {
                nome: "Wandher Omisso",
                posicao: "Lurker",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 }
            },
            {
                nome: "Psicologo Vitor",
                posicao: "Entry",
                foto: "https://i.imgur.com/r84NksO.png",
                stats: { mir: 70, mov: 70, noc: 70, uti: 70, imp: 70, clu: 70 }
            }
        ];

        // 2. O Motor que gera as cartas na tela
        const container = document.getElementById('time-amigos');

        jogadores.forEach(jogador => {
            // Calcula o Overall dinamicamente
            const st = jogador.stats;
            const soma = st.mir + st.mov + st.noc + st.uti + st.imp + st.clu;
            const overall = Math.round(soma / 6);

            // Monta o esqueleto da carta
            const cartaHTML = `
                <div class="cs-card">
                    <div class="card-header">
                        <div class="header-left">
                            <div class="overall">${overall}</div>
                            <div class="position">${jogador.posicao}</div>
                        </div>
                        <div class="header-right">
                            <div class="country">BR</div>
                            <div class="team">AMIGOS</div>
                        </div>
                    </div>
                    <div class="card-image">
                        <img src="${jogador.foto}" alt="Foto de ${jogador.nome}">
                    </div>
                    <div class="card-name">${jogador.nome}</div>
                    <div class="card-stats">
                        <div class="stat-column">
                            <div class="stat-row"><span class="stat-value">${st.mir}</span><span class="stat-label">MIR</span></div>
                            <div class="stat-row"><span class="stat-value">${st.mov}</span><span class="stat-label">MOV</span></div>
                            <div class="stat-row"><span class="stat-value">${st.noc}</span><span class="stat-label">NOC</span></div>
                        </div>
                        <div class="stat-column">
                            <div class="stat-row"><span class="stat-value">${st.uti}</span><span class="stat-label">UTI</span></div>
                            <div class="stat-row"><span class="stat-value">${st.imp}</span><span class="stat-label">IMP</span></div>
                            <div class="stat-row"><span class="stat-value">${st.clu}</span><span class="stat-label">CLU</span></div>
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML += cartaHTML;
        });
    </script>
</body>

</html>
